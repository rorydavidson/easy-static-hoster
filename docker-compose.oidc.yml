# OIDC / SSO overlay — adds oauth2-proxy in front of nginx
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up -d
#
# Required env vars (add to .env):
#   OIDC_ISSUER_URL=https://keycloak.example.com/realms/myrealm
#   OIDC_CLIENT_ID=easy-hoster
#   OIDC_CLIENT_SECRET=<your-client-secret>
#   COOKIE_SECRET=<openssl rand -base64 24>
#   OIDC_ALLOWED_GROUP=easyhoster-users
#
# The oauth2-proxy container handles the OIDC login flow and proxies
# authenticated requests to nginx. Nginx is no longer exposed to the
# host — only oauth2-proxy is reachable from outside.

services:
  # Remove nginx's host port — traffic must go through oauth2-proxy
  nginx:
    ports: !override []

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=http://nginx:8080
      - --provider=oidc
      - --oidc-issuer-url=${OIDC_ISSUER_URL:?OIDC_ISSUER_URL must be set}
      - --client-id=${OIDC_CLIENT_ID:?OIDC_CLIENT_ID must be set}
      - --client-secret=${OIDC_CLIENT_SECRET:?OIDC_CLIENT_SECRET must be set}
      - --cookie-secret=${COOKIE_SECRET:?COOKIE_SECRET must be set (openssl rand -base64 24)}
      - --cookie-secure=${OIDC_COOKIE_SECURE:-false}
      - --cookie-name=_easyhoster_oidc
      - --email-domain=*
      - --scope=openid email profile
      - --oidc-groups-claim=${OIDC_GROUPS_CLAIM:-groups}
      - --allowed-group=${OIDC_ALLOWED_GROUP:?OIDC_ALLOWED_GROUP must be set (e.g. easyhoster-users)}
      - --pass-user-headers=true
      - --set-xauthrequest=true
      - --skip-provider-button=true
      - --insecure-oidc-allow-unverified-email=true
      - --reverse-proxy=true
      - --silence-ping-logging=true
    ports:
      - "${PORT:-4180}:4180"
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped
