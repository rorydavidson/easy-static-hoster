worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't advertise nginx version in headers or error pages
    server_tokens off;

    # Temp paths writable by non-root nginx worker
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    sendfile on;
    keepalive_timeout 30;

    # Trust upstream reverse-proxy / Docker gateway IPs so that rate limiting
    # and logging use the real client IP rather than the proxy's container IP.
    # Covers all three RFC-1918 ranges that Docker networks use.
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Rate limiting: 5 req/s per IP, burst up to 20.
    # Enough for fast human browsing; significantly impedes scrapers.
    limit_req_zone $binary_remote_addr zone=main:10m rate=5r/s;

    # Known AI training crawlers and aggressive scrapers.
    # These bots commonly ignore X-Robots-Tag / robots.txt, so we block
    # them actively. Matched case-insensitively against User-Agent.
    map $http_user_agent $blocked_bot {
        default             0;

        # OpenAI
        ~*GPTBot            1;
        ~*OAI-SearchBot     1;
        ~*ChatGPT-User      1;

        # Anthropic
        ~*ClaudeBot         1;
        ~*anthropic-ai      1;
        ~*Claude-Web        1;

        # Common Crawl (primary source for LLM training data)
        ~*CCBot             1;

        # Other AI / LLM companies
        ~*PerplexityBot     1;
        ~*cohere-ai         1;
        ~*AI2Bot            1;
        ~*YouBot            1;
        ~*Diffbot           1;

        # Aggressive commercial scrapers
        ~*Bytespider        1;
        ~*Amazonbot         1;
        ~*PetalBot          1;
        ~*omgili            1;
        ~*AhrefsBot         1;
        ~*SemrushBot        1;
        ~*MJ12bot           1;
        ~*DotBot            1;

        # Generic scraper libraries (rare in browsers, common in bots)
        ~*Scrapy            1;
        ~*python-httpx      1;
    }

    # Conceal detailed error messages
    proxy_intercept_errors on;

    log_format minimal '$remote_addr "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log minimal;

    server {
        listen 8080;
        server_name _;

        root  /content;
        index index.html;

        limit_req zone=main burst=20 nodelay;

        # Return 403 for known bots regardless of what they request
        if ($blocked_bot) { return 403; }

        # Security headers applied to all responses
        add_header X-Frame-Options        "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                       always;
        add_header X-XSS-Protection       "1; mode=block"                 always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag           "noindex, nofollow"             always;

        # Optional global auth — global_auth.conf is written by entrypoint.sh;
        # it contains auth_basic directives when AUTH_GLOBAL=true, otherwise empty.
        include /etc/nginx/global_auth.conf;

        # Root: serve the generated index
        location = / {
            try_files /index.html =503;
        }

        # Short link redirects — proxied to the generator's redirect server
        location /s/ {
            proxy_pass         http://generator:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 5s;
        }

        # Upload endpoint — proxied as-is; the generator validates credentials
        # on every request via the Authorization header (Basic Auth mode) or
        # X-Forwarded-User/Email headers (OIDC mode, set by oauth2-proxy).
        location = /api/upload {
            proxy_pass         http://generator:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-User  $http_x_forwarded_user;
            proxy_set_header   X-Forwarded-Email $http_x_forwarded_email;
            proxy_read_timeout 30s;
        }

        # All other API calls (shortlinks, mkdir) — auth headers forwarded for OIDC
        location /api/ {
            proxy_pass         http://generator:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-User  $http_x_forwarded_user;
            proxy_set_header   X-Forwarded-Email $http_x_forwarded_email;
            proxy_read_timeout 5s;
        }

        # Instruct all crawlers to index nothing
        location = /robots.txt {
            add_header Content-Type "text/plain; charset=utf-8" always;
            add_header X-Robots-Tag "noindex, nofollow"         always;
            return 200 "User-agent: *\nDisallow: /\n";
        }

        # ai.txt — emerging standard checked by some AI crawlers
        location = /ai.txt {
            add_header Content-Type "text/plain; charset=utf-8" always;
            return 200 "User-agent: *\nDisallow: /\n";
        }

        # Block meta.json files from being served directly
        location ~* /meta\.json$ {
            return 404;
        }

        # Block dot-files (.htpasswd, .env, etc.)
        location ~ /\. {
            return 404;
        }

        # Everything else: serve as static file
        location / {
            try_files $uri =404;
        }

        # Minimal custom error pages (no nginx version in body)
        error_page 404 /404.html;
        location = /404.html {
            internal;
            return 404 "Not found\n";
        }

        error_page 503 /503.html;
        location = /503.html {
            internal;
            return 503 "Starting up, please retry\n";
        }
    }
}
