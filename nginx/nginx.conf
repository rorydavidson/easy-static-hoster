worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't advertise nginx version in headers or error pages
    server_tokens off;

    # Temp paths writable by non-root nginx worker
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    sendfile on;
    keepalive_timeout 30;

    # Rate limiting: 20 req/s per IP, burst up to 40
    limit_req_zone $binary_remote_addr zone=main:10m rate=20r/s;

    # Conceal detailed error messages
    proxy_intercept_errors on;

    log_format minimal '$remote_addr "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log minimal;

    server {
        listen 8080;
        server_name _;

        root  /content;
        index index.html;

        limit_req zone=main burst=40 nodelay;

        # Security headers applied to all responses
        add_header X-Frame-Options        "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                       always;
        add_header X-XSS-Protection       "1; mode=block"                 always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # Optional basic auth — auth.conf is written by entrypoint.sh
        include /etc/nginx/auth.conf;

        # Root: serve the generated index
        location = / {
            try_files /index.html =503;
        }

        # Short link redirects — proxied to the generator's redirect server
        location /s/ {
            proxy_pass         http://generator:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 5s;
        }

        # Short link management API — proxied to the generator
        location /api/ {
            proxy_pass         http://generator:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 5s;
        }

        # Block meta.json files from being served directly
        location ~* /meta\.json$ {
            return 404;
        }

        # Block dot-files (.htpasswd, .env, etc.)
        location ~ /\. {
            return 404;
        }

        # Everything else: serve as static file
        location / {
            try_files $uri =404;
        }

        # Minimal custom error pages (no nginx version in body)
        error_page 404 /404.html;
        location = /404.html {
            internal;
            return 404 "Not found\n";
        }

        error_page 503 /503.html;
        location = /503.html {
            internal;
            return 503 "Starting up, please retry\n";
        }
    }
}
